name: AI DevOps Pipeline
on: [push]  # Every time you upload code, this starts

jobs:
  build-and-test:
    runs-on: ubuntu-latest  # This is the Cloud Hardware
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install AI Libraries
        run: pip install mlflow scikit-learn pandas

      - name: Run AI Training
        run: python train.py

      - name: Build Docker Image
        run: docker build -t my-ai-model:latest .