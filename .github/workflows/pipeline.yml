name: AI DevOps Pipeline
on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install AI Libraries
        run: pip install -r requirements.txt

      - name: Run AI Training
        run: python train.py

      - name: Build Docker Image
        run: docker build -t my-ai-model:latest .
